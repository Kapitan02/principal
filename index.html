    <div class="opts">

    💬 OBTENER MI BONO AHORA
  </a>

  <script>
  (function(){
    // === CONFIGURACIÓN: dos links w.app =====================================
    var DESTINOS = [
      { type: 'link', value: 'https://w.app/col1', label: 'agente_1' },
      { type: 'link', value: '', label: 'agente_2' }
    ];

    // === HELPERS =============================================================
    var $ = s => document.querySelector(s);
    var qs = new URLSearchParams(location.search);

    // hash DJB2 para asignación determinística
    function djb2(str){
      var h = 5381, i = str.length;
      while(i){ h = ((h << 5) + h) ^ str.charCodeAt(--i); } // xor variant
      return h >>> 0; // unsigned
    }
    function chooseByHash(seed, arrLen){
      var h = djb2(seed);
      return h % arrLen;
    }

    // Storage helpers (backup si no hay fbclid)
    function lsGet(k){ try{ return localStorage.getItem(k); }catch(e){ return null; } }
    function lsSet(k,v){ try{ localStorage.setItem(k,v); return true; }catch(e){ return false; } }
    function cookieGet(k){
      var m = document.cookie.split('; ').find(r=>r.startsWith(k+'='));
      return m ? decodeURIComponent(m.split('=')[1]) : null;
    }
    function cookieSet(k,v,days){
      try{
        var d = new Date(); d.setTime(d.getTime()+days*24*60*60*1000);
        document.cookie = k+'='+encodeURIComponent(v)+'; expires='+d.toUTCString()+'; path=/; SameSite=Lax';
        return true;
      }catch(e){ return false; }
    }

    // Selección robusta: fbclid → determinístico; si no, RR (LS→cookie) → azar
    function pickDestino(){
      var len = DESTINOS.length;

      // 1) Si hay fbclid (o parámetro manual wa_split), uso hash determinístico
      var seed = qs.get('wa_split') || qs.get('fbclid') || qs.get('gclid') || '';
      if(seed){
        return DESTINOS[ chooseByHash(seed, len) ];
      }

      // 2) Sin seed: Round-robin por navegador (LS→cookie)
      var key='__wa_rr_idx__';
      var raw = lsGet(key); if(raw === null) raw = cookieGet(key);
      var idx = parseInt(raw || '0', 10); if(!Number.isFinite(idx) || idx < 0) idx = 0;

      var d = DESTINOS[idx % len];
      var next = ((idx + 1) % len).toString();
      if(!lsSet(key, next)) cookieSet(key, next, 30);

      // 3) Fallback: 50/50 aleatorio si algo raro pasa
      return d || DESTINOS[Math.floor(Math.random()*len)];
    }

    // Pixel helpers
    function genEventID(prefix){
      var core = (typeof crypto !== 'undefined' && crypto.randomUUID)
        ? crypto.randomUUID()
        : ('id_' + Date.now() + '_' + Math.random().toString(36).slice(2,10));
      return (prefix ? prefix + '_' : '') + core;
    }

    // Entorno (por si más adelante necesitás abrir app/wa para teléfonos)
    var UA = navigator.userAgent || "";
    var isMobile = /Android|iPhone|iPad|iPod|IEMobile|Opera Mini/i.test(UA);
    var isDesktop = !isMobile;

    // === GATE ================================================================
    var selected = null;
    document.querySelectorAll('input[name="juego"]').forEach(r=>{
      r.addEventListener('change', ()=>{
        selected = document.querySelector('input[name="juego"]:checked')?.value || null;
        document.querySelectorAll('.gate .opts label').forEach(l=>{
          l.classList.toggle('active', l.querySelector('input').checked);
        });
        toggleContinue();
      });
    });
    $('#mayor').addEventListener('change', toggleContinue);

    function toggleContinue(){
      var ok = !!selected && $('#mayor').checked;
      var btn = $('#continuar');
      btn.disabled = !ok;
      btn.classList.toggle('enabled', ok);
    }

    // Mostrar botón y previsualizar href
    $('#continuar').addEventListener('click', function(){
      try {
        window.__gateEventID = genEventID('gate');
        if(window.fbq) fbq('trackCustom','GatePassed',{ juego: selected || '', eventID: window.__gateEventID });
      } catch(e){}

      var btn = $('#wa-btn');
      btn.style.display = 'inline-block';
      btn.scrollIntoView({ behavior:'smooth', block:'center' });

      var destino = pickDestino();
      btn.href = destino.value; // preview
    });

    // Click real → abrir destino y trackear elección
    $('#wa-btn').addEventListener('click', function(e){
      e.preventDefault();
      var destino = pickDestino();

      try {
        var seed = qs.get('wa_split') || qs.get('fbclid') || qs.get('gclid') || '';
        var method = seed ? 'hash' : (lsGet ? 'rr' : 'random');
        window.__waEventID = genEventID('wa');
        if(window.fbq) fbq('trackCustom','WhatsAppClick', {
          juego: selected || '',
          eventID: window.__waEventID,
          fbclid: qs.get('fbclid') || '',
          utm_source: qs.get('utm_source') || '',
          utm_medium: qs.get('utm_medium') || '',
          utm_campaign: qs.get('utm_campaign') || '',
          utm_content: qs.get('utm_content') || '',
          utm_term: qs.get('utm_term') || '',
          destino_label: destino.label || '',
          asignacion: method,
          seed_preview: (seed||'').slice(0,24)
        });
      } catch(e){}

      setTimeout(() => {
  window.open(destino.value, '_blank', 'noopener');
}, 300);
    });

  })();
  </script>
